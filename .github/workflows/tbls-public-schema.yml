name: Generate DB Docs with tbls

on:
  workflow_dispatch:
  schedule:
    # 毎日 09:00 JST = 00:00 UTC
    - cron: "0 0 * * *"

jobs:
  generate-db-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout develop
        uses: actions/checkout@v6
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup tbls
        uses: k1low/setup-tbls@v1

      - name: Generate DB docs
        run: tbls doc --rm-dist
        env:
          SUPABASE_DOCS_DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}

      - name: Commit docs to update branch
        run: |
          if [ -z "$(git status --porcelain -- docs/db)" ]; then
            echo "No changes in docs/db"
            exit 0
          fi

          DATETIME="$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B tbls/update-db-docs

          git add docs/db
          git commit -m "docs: update tbls database docs (${DATETIME})"

          git push --force-with-lease origin tbls/update-db-docs
