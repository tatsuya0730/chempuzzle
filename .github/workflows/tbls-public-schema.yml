name: Export public schema

on:
  workflow_dispatch:
  pull_request:
    paths:
      - ".github/workflows/tbls-public-schema.yml"
      - "docs/supabase-spec.md"

jobs:
  tbls:
    name: tbls public schema
    runs-on: ubuntu-latest
    env:
      TBLS_DSN: ${{ secrets.SUPABASE_DATABASE_URL }}
      TBLS_DOC_PATH: docs/db/schema

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate database URL
        run: test -n "$TBLS_DSN"

      - name: Set up tbls
        uses: k1LoW/setup-tbls@v1

      - name: Export public schema docs
        run: tbls doc

      - name: Upload schema docs
        uses: actions/upload-artifact@v4
        with:
          name: tbls-public-schema
          path: docs/db/schema
